# STM32H743 OpenOCD 配置示例
# 后续可按板卡和调试器调整：
# - 若不是 ST-Link，请替换 interface/*.cfg
# - 若芯片不是 H743，请替换 target/*.cfg

source [find interface/stlink.cfg]
transport select hla_swd

# 可按板卡情况调整速度；不稳定时可降到 2000 或 1000
adapter speed 4000

source [find target/stm32h7x.cfg]

# 复位策略：H7 常用 connect_assert_srst
reset_config srst_only srst_nogate connect_assert_srst
